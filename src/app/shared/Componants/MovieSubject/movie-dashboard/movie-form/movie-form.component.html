<mat-card>
    <mat-card-content>
        <form [formGroup]="movieForm " (ngSubmit)=onSubmit()> 
            <div class="form-group">
                <label for="title">Title</label>
                <input 
                formControlName="title"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['title'].touched && f['title'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>

             
            <div class="form-group">
                <label for="desc">Description</label>
                <input 
                formControlName="desc"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['desc'].touched && f['desc'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
             <div class="form-group">
                <label for="image">ImageUrl</label>
                <input 
                formControlName="image"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['image'].touched && f['image'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>

            <div class="form-group">
                <label for="rating">Rating</label>
                <select formControlName="rating" class="form-control">
                    <option *ngFor="let r of ratingg; trackby : trackById" [value]="r">{{r}}</option>
                </select>
            </div>

            <button *ngIf="!isInEditMode" mat-raised-button color="primary" class="w-100">Add Movie</button>
            <button (click)="onUpdate()" *ngIf="isInEditMode" type="button" mat-raised-button color="primary" class="w-100">Update Movie</button>
            
        </form>
    </mat-card-content>
</mat-card>
