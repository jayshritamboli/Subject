<mat-card class="example-card h-100">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>{{data.title}}</mat-card-title>
  </mat-card-header>
  <img mat-card-image [src]="data.image" [alt]="data.image">
  <mat-card-content>
    <p>
        {{data.desc}}
    </p>
    <p>
       Rating : <span>{{data.rating}}</span> 
    </p>
  </mat-card-content>
  <mat-card-actions class="d-flex justify-content-between align-items-center">
    <button (click)="onEdit()" mat-raised-button color="primary">Edit</button>
    <button (click)="onRemove()" mat-raised-button color="accent">Delete</button>
  </mat-card-actions>
</mat-card>
