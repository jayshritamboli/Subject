
<mat-card class="example-card h-100">
  <mat-card-title-group>
    <mat-card-title>{{data.title}}</mat-card-title>
    <mat-card-subtitle>{{data.category}}</mat-card-subtitle>
    <mat-card-subtitle>Rs.{{data.price}}</mat-card-subtitle>
    <img mat-card-lg-image [src]="data.image">
  </mat-card-title-group>
  <mat-card-content>
    <p>
        {{data.description}}
    </p> 
  </mat-card-content>
  <mat-card-actions class="d-flex justify-content-between">
    <button (click)="onEdit()" mat-raised-button color="primary">Edit</button>
    <button (click)="onRemove()" mat-raised-button color="warn">Delete</button>
  </mat-card-actions>
</mat-card>
