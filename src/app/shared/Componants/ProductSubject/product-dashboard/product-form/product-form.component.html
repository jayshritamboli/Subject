<mat-card>
    <mat-card-content>
        <form [formGroup]="prodForm" (ngSubmit)="onSubmit()"> 
            <div class="form-group">
                <label for="title">Title</label>
                <input 
                formControlName="title"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['title'].touched && f['title'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input 
                formControlName="category"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['category'].touched && f['category'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input 
                formControlName="description"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['description'].touched && f['description'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
             
            <div class="form-group">
                <label for="price">Price</label>
                <input 
                formControlName="price"
                type="number" class="form-control">

                <strong class="text-danger" *ngIf="f['price'].touched && f['price'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
            <div class="form-group">
                <label for="image">ImageUrl</label>
                <input 
                formControlName="image"
                type="text" class="form-control">

                <strong class="text-danger" *ngIf="f['image'].touched && f['image'].hasError('required')">
                    This is an required field!!!
                </strong>
            </div>
            <button *ngIf="!isInEditMode" mat-raised-button color="primary" class="w-100">Add Product</button>
            <button (click)="onUpdate()" *ngIf="isInEditMode" type="button" mat-raised-button color="primary" class="w-100">Update Product</button>  
        </form>
    </mat-card-content>
</mat-card>
